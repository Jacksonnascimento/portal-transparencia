name: Deploy Admin (Retaguarda)

on:
  push:
    branches: [ main ]
    paths:
      - 'portal-transparencia-web/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e Push
        uses: docker/build-push-action@v5
        with:
          context: ./portal-transparencia-web
          push: true
          platforms: linux/arm64
          tags: ghcr.io/jacksonnascimento/horizon-admin:latest
          build-args: |
            NEXT_PUBLIC_API_URL=/api-proxy
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy na VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/horizon
            export DOCKER_IMAGE_ADMIN=ghcr.io/jacksonnascimento/horizon-admin:latest
            docker compose pull horizon-admin
            docker compose up -d --force-recreate horizon-admin