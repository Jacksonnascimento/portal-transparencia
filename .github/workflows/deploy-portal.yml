name: Deploy Portal (Público)

on:
  push:
    branches: [ main ]
    paths:
      - 'portal-front/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e Push
        uses: docker/build-push-action@v5
        with:
          context: ./portal-front
          push: true
          platforms: linux/arm64
          tags: ghcr.io/jacksonnascimento/horizon-portal:latest
          # INJETANDO A URL DA API AQUI:
          build-args: |
            NEXT_PUBLIC_API_URL=http://91.98.201.11:8080/api/v1

      - name: Deploy na VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/horizon
            export DOCKER_IMAGE_PORTAL=ghcr.io/jacksonnascimento/horizon-portal:latest
            docker compose pull horizon-portal
            docker compose up -d --force-recreate horizon-portal