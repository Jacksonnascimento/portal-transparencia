name: Deploy API

on:
  push:
    branches: [ main ]
    paths:
      - 'portal-transparencia-api/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      # AJUDA 1: Necessário para o robô entender o processador ARM da VPS
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # AJUDA 2: Habilita o construtor que aceita múltiplas arquiteturas
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e Push da Imagem Docker
        uses: docker/build-push-action@v5
        with:
          context: ./portal-transparencia-api
          push: true
          # AJUDA 3: Força a imagem a ser feita para o seu processador ARM
          platforms: linux/arm64
          tags: ghcr.io/jacksonnascimento/horizon-api:latest

      - name: Comandar a VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/horizon
            export DOCKER_IMAGE_API=ghcr.io/jacksonnascimento/horizon-api:latest
            docker compose pull horizon-api
            docker compose up -d horizon-api